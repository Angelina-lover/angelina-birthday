<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>С днем рождения, Котёночек</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1: #fff0f4;
      --bg2: #ffe4d7;
      --bg3: #fff8eb;
      --text: #2a1f24;
      --muted: #755f69;
      --accent: #ff5d87;
      --accent2: #ff9e67;
      --card: #ffffffd9;
      --border: #ffd5e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #ffffffb7 0 20%, #0000 45%),
        radial-gradient(circle at 90% 75%, #ffffffa6 0 16%, #0000 45%),
        linear-gradient(150deg, var(--bg1), var(--bg2) 45%, var(--bg3));
    }

    .wrap {
      width: min(100%, 900px);
      margin: 0 auto;
      padding: 20px 14px 28px;
    }

    .hero {
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px 14px;
      background: var(--card);
      box-shadow: 0 12px 30px #ff8e7d2e;
      animation: show 0.7s ease;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #7f3655;
      background: linear-gradient(90deg, #ffdbe8, #ffe7d7);
      border: 1px solid #ffc8da;
      border-radius: 999px;
      padding: 7px 11px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-family: "Marck Script", cursive;
      font-size: clamp(38px, 11vw, 64px);
      line-height: 1;
      color: #4e2d3c;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .photo-card {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      background: #fff;
    }

    .photo-card img {
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
    }

    .note {
      margin-top: 14px;
      display: grid;
      gap: 12px;
    }

    .note-item {
      border: 1px solid #ffe2ea;
      border-radius: 16px;
      background: #fffdfdcb;
      padding: 12px;
      font-size: 15px;
      line-height: 1.65;
    }

    .final {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: #896c78;
      font-weight: 600;
    }

    @keyframes show {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 700px) {
      .wrap {
        padding: 32px 20px 40px;
      }

      .hero {
        padding: 26px 24px;
      }

      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="tag">С днем рождения, Котёночек</span>
      <p class="subtitle">Этот сайт сделан для тебя с любовью. Пусть каждый день приносит тебе тепло, улыбки и вдохновение.</p>

      <div class="note">
        <div class="note-item">
          Спасибо тебе за нежность, заботу и свет, который ты даришь мне каждый день.
        </div>
        <div class="note-item">
          Я желаю тебе счастья, исполнения мечт и самых ярких эмоций. Очень сильно люблю тебя.
        </div>
      </div>

      <p class="final">Твой Котик</p>

      <div class="photo-card">
        <!-- ВСТАВКА ФОТО: замени src на путь к вашему фото, например assets/angelina.jpg -->
        <img src="assets/photo-placeholder.svg" alt="Фото Котёночка" />
      </div>
    </section>
  </main>
</body>
</html>
